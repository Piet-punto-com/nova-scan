<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA Scan</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
  .app{max-width:480px;margin:0 auto;padding:20px 16px 40px}
  h1{font-size:22px;font-weight:600;margin-bottom:4px}
  .sub{font-size:13px;color:#666;margin-bottom:20px}
  .card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid #e8e8e8}
  .card-title{font-size:13px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:0.5px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
  .card-title .toggle-icon{font-size:11px;color:#aaa;transition:transform 0.2s}
  .card-title .toggle-icon.open{transform:rotate(180deg)}
  .collapsible{overflow:hidden;transition:max-height 0.3s ease;max-height:0}
  .collapsible.open{max-height:300px}
  .collapsible-inner{padding-top:10px}
  input,textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fafafa;color:#1a1a1a;outline:none}
  input:focus,textarea:focus{border-color:#6C63FF;box-shadow:0 0 0 3px rgba(108,99,255,0.1)}
  textarea{resize:none;line-height:1.5}
  .btn{width:100%;padding:12px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;margin-top:8px}
  .btn-primary{background:#6C63FF;color:#fff}
  .btn-primary:hover{background:#5a52d5}
  .btn-primary:disabled{opacity:0.5;cursor:not-allowed}
  .btn-secondary{background:#f0f0f0;color:#444}
  .btn-secondary:hover{background:#e4e4e4}
  .btn-cam{background:#1a1a1a;color:#fff}
  .btn-cam:hover{background:#333}
  .btn-cam.active{background:#DC2626;color:#fff}
  .progress{height:4px;border-radius:2px;background:#eee;overflow:hidden;margin:10px 0}
  .progress-fill{height:100%;width:0%;background:#6C63FF;border-radius:2px;transition:width 0.3s}
  .msg{font-size:13px;padding:10px 12px;border-radius:8px;margin:8px 0}
  .msg-info{background:#EEF2FF;color:#4338CA}
  .msg-error{background:#FEF2F2;color:#DC2626}
  .msg-ok{background:#F0FDF4;color:#16A34A}
  .result{border-radius:12px;padding:16px;margin-top:12px;border:1px solid transparent}
  .g1{background:#F0FDF4;border-color:#86EFAC}.g2{background:#EFF6FF;border-color:#93C5FD}
  .g3{background:#FFFBEB;border-color:#FCD34D}.g4{background:#FFF1F2;border-color:#FCA5A5}
  .r-badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px;margin-bottom:8px}
  .rb1{background:#86EFAC;color:#14532D}.rb2{background:#93C5FD;color:#1E3A5F}
  .rb3{background:#FCD34D;color:#78350F}.rb4{background:#FCA5A5;color:#7F1D1D}
  .r-name{font-size:17px;font-weight:700;margin-bottom:6px}
  .r-text{font-size:14px;line-height:1.55;margin-bottom:10px}
  .flags{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
  .flag{font-size:13px;padding:6px 10px;border-radius:7px;border-left:3px solid transparent;line-height:1.4}
  .fd{background:#FFF1F2;border-color:#EF4444;color:#7F1D1D}
  .fw{background:#FFFBEB;border-color:#F59E0B;color:#78350F}
  .fo{background:#F0FDF4;border-color:#22C55E;color:#14532D}
  .r-tip{font-size:13px;color:#555;border-top:1px solid rgba(0,0,0,0.07);padding-top:10px}
  .api-hint{font-size:12px;color:#999;margin-top:6px;line-height:1.4}
  .key-toggle{font-size:12px;color:#6C63FF;cursor:pointer;background:none;border:none;font-family:inherit;margin-top:4px;padding:0}
  .api-status{font-size:12px;color:#16A34A;margin-left:8px}
  .divider{display:flex;align-items:center;gap:8px;margin:12px 0;color:#aaa;font-size:12px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:#eee}
  .example-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .ex-btn{font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer;background:#f0f0f0;border:none;color:#444;font-family:inherit}
  .ex-btn:hover{background:#e4e4e4}
  .cam-wrap{position:relative;border-radius:10px;overflow:hidden;background:#000;margin-bottom:10px;display:none}
  #video{width:100%;display:block;max-height:260px;object-fit:cover}
  .cam-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .scan-frame{width:200px;height:80px;border:2px solid #6C63FF;border-radius:8px;position:relative}
  .scan-line{position:absolute;left:4px;right:4px;height:2px;background:#6C63FF;animation:scan 1.8s ease-in-out infinite}
  @keyframes scan{0%,100%{top:10%}50%{top:85%}}
  .cam-hint{text-align:center;font-size:12px;color:#888;margin-bottom:8px;display:none}
</style>
</head>
<body>
<div class="app">
  <h1>NOVA Scan</h1>
  <p class="sub">Lebensmittel nach Verarbeitungsgrad klassifizieren</p>

  <div class="card">
    <div class="card-title" onclick="toggleApi()">
      <span>API-Einstellungen <span class="api-status" id="api-status"></span></span>
      <span class="toggle-icon" id="api-icon">▼</span>
    </div>
    <div class="collapsible" id="api-panel">
      <div class="collapsible-inner">
        <input type="password" id="api-key" placeholder="Anthropic API-Key eingeben ...">
        <p class="api-hint">Dein Key wird nur lokal in diesem Browser gespeichert.</p>
        <button class="key-toggle" onclick="saveKey()">Key speichern</button>
        <div id="key-msg"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title" style="cursor:default">Produkt scannen</div>
    <div style="margin-top:10px">
      <div class="cam-wrap" id="cam-wrap">
        <video id="video" autoplay muted playsinline></video>
        <div class="cam-overlay">
          <div class="scan-frame"><div class="scan-line"></div></div>
        </div>
      </div>
      <p class="cam-hint" id="cam-hint">Halte den Barcode in den lila Rahmen</p>
      <button class="btn btn-cam" id="cam-btn" onclick="toggleCamera()">Kamera starten</button>
      <div class="divider">oder Barcode eingeben</div>
      <input type="text" id="barcode" placeholder="EAN-Barcode (z.B. 4001686011256)" style="margin-bottom:8px">
      <button class="btn btn-secondary" onclick="lookupBarcode()">In Open Food Facts suchen</button>
      <div id="lookup-msg"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title" style="cursor:default">Zutatenliste</div>
    <div style="margin-top:10px">
      <input type="text" id="product-name" placeholder="Produktname (optional)" style="margin-bottom:8px">
      <textarea id="ingredients" rows="5" placeholder="Zutaten hier eingeben oder aus Open Food Facts übernehmen ..."></textarea>
      <div class="example-row">
        <button class="ex-btn" onclick="loadEx('brot')">Sauerteigbrot</button>
        <button class="ex-btn" onclick="loadEx('joghurt')">Fruchtjoghurt</button>
        <button class="ex-btn" onclick="loadEx('haribo')">Haribo</button>
      </div>
      <div class="progress"><div class="progress-fill" id="progress"></div></div>
      <button class="btn btn-primary" id="analyze-btn" onclick="analyze()">Analysieren</button>
    </div>
  </div>

  <div id="result-area"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.18.6/umd/index.min.js"></script>
<script>
let codeReader=null, scanning=false;

const examples={
  brot:{name:'Sauerteigbrot',ing:'Vollkornweizenmehl, Wasser, Sauerteig, Salz, Hefe'},
  joghurt:{name:'Erdbeer-Fruchtjoghurt',ing:'Magermilch, Erdbeeren 8%, Zucker, modifizierte Stärke, Glukose-Fruktose-Sirup, natürliche Aromen, Farbstoff E120, Emulgator E471, Geliermittel Pektin'},
  haribo:{name:'Haribo Phantasia',ing:'Glukosesirup, Zucker, Gelatine, Dextrose, Säuerungsmittel Citronensäure, Frucht- und Pflanzenkonzentrate, Sonnenblumenöl, Aroma Karamellsirup, Überzugsmittel Bienenwachs'}
};

function loadEx(k){
  document.getElementById('product-name').value=examples[k].name;
  document.getElementById('ingredients').value=examples[k].ing;
  document.getElementById('result-area').innerHTML='';
}

function toggleApi(){
  const panel=document.getElementById('api-panel');
  const icon=document.getElementById('api-icon');
  const isOpen=panel.classList.contains('open');
  panel.classList.toggle('open',!isOpen);
  icon.classList.toggle('open',!isOpen);
}

function saveKey(){
  const key=document.getElementById('api-key').value.trim();
  if(!key){alert('Bitte zuerst API-Key eingeben');return}
  localStorage.setItem('nova_api_key',key);
  showMsg('key-msg','Key gespeichert!','ok');
  document.getElementById('api-status').textContent='✓ gespeichert';
  setTimeout(()=>{
    document.getElementById('key-msg').innerHTML='';
    const panel=document.getElementById('api-panel');
    const icon=document.getElementById('api-icon');
    panel.classList.remove('open');
    icon.classList.remove('open');
  },1500);
}

window.onload=()=>{
  const saved=localStorage.getItem('nova_api_key');
  if(saved){
    document.getElementById('api-key').value=saved;
    document.getElementById('api-status').textContent='✓ gespeichert';
  } else {
    const panel=document.getElementById('api-panel');
    const icon=document.getElementById('api-icon');
    panel.classList.add('open');
    icon.classList.add('open');
  }
};

async function toggleCamera(){
  if(scanning){stopCamera();return}
  const btn=document.getElementById('cam-btn');
  btn.textContent='Wird gestartet...';btn.disabled=true;
  try{
    if(!window.ZXing) throw new Error('Scanner-Bibliothek nicht geladen');
    codeReader=new ZXing.BrowserMultiFormatReader();
    const devices=await ZXing.BrowserMultiFormatReader.listVideoInputDevices();
    if(!devices.length) throw new Error('Keine Kamera gefunden');
    const back=devices.find(d=>/back|rear|environment/i.test(d.label))||devices[devices.length-1];
    document.getElementById('cam-wrap').style.display='block';
    document.getElementById('cam-hint').style.display='block';
    scanning=true;
    btn.textContent='Kamera stoppen';btn.classList.add('active');btn.disabled=false;
    codeReader.decodeFromVideoDevice(back?.deviceId,'video',async(result,err)=>{
      if(result){
        const code=result.getText();
        stopCamera();
        document.getElementById('barcode').value=code;
        showMsg('lookup-msg','Barcode erkannt: '+code+' — suche Produkt...','info');
        await lookupBarcode();
      }
    });
  }catch(e){
    stopCamera();
    showMsg('lookup-msg','Kamera nicht verfügbar: '+e.message,'error');
  }
}

function stopCamera(){
  if(codeReader){codeReader.reset();codeReader=null}
  scanning=false;
  document.getElementById('cam-wrap').style.display='none';
  document.getElementById('cam-hint').style.display='none';
  const btn=document.getElementById('cam-btn');
  btn.textContent='Kamera starten';btn.classList.remove('active');btn.disabled=false;
}

async function lookupBarcode(){
  const code=document.getElementById('barcode').value.trim();
  if(!code){showMsg('lookup-msg','Bitte Barcode eingeben','error');return}
  showMsg('lookup-msg','Suche in Open Food Facts...','info');
  try{
    const res=await fetch(`https://de.openfoodfacts.org/api/v0/product/${code}.json`);
    const data=await res.json();
    if(data.status!==1){showMsg('lookup-msg','Produkt nicht gefunden. Zutaten bitte manuell eingeben.','error');return}
    const p=data.product;
    const name=p.product_name_de||p.product_name||'Unbekannt';
    const brand=p.brands?` · ${p.brands}`:'';
    const ing=p.ingredients_text_de||p.ingredients_text||'';
    document.getElementById('product-name').value=name;
    if(ing){
      document.getElementById('ingredients').value=ing;
      showMsg('lookup-msg',`Gefunden: ${name}${brand}. Zutatenliste übernommen.`,'ok');
    } else {
      showMsg('lookup-msg',`Gefunden: ${name}${brand} — keine Zutatenliste verfügbar.`,'error');
    }
  }catch(e){
    showMsg('lookup-msg','Verbindungsfehler. Bitte erneut versuchen.','error');
  }
}

async function analyze(){
  const key=document.getElementById('api-key').value.trim();
  const ing=document.getElementById('ingredients').value.trim();
  const name=document.getElementById('product-name').value.trim()||'Produkt';
  if(!key){alert('Bitte zuerst API-Key eingeben und speichern');return}
  if(!ing){alert('Bitte Zutatenliste eingeben');return}
  const btn=document.getElementById('analyze-btn');
  btn.disabled=true;btn.textContent='KI analysiert...';
  const fill=document.getElementById('progress');
  let p=0;const t=setInterval(()=>{p=Math.min(p+7,88);fill.style.width=p+'%'},180);
  const prompt=`Du bist ein Ernährungsexperte für NOVA-Klassifikation nach Monteiro.
Analysiere diese Zutatenliste eines deutschen Supermarktprodukts.
Produkt: "${name}"
Zutaten: "${ing}"
Antworte NUR mit JSON:
{"gruppe":1,"gruppenname":"Unverarbeitet","bewertung":"Max 2 Sätze warum diese Gruppe.","flags":[{"typ":"danger","text":"Befund"}],"empfehlung":"1 konkreter Tipp"}
Gruppen: 1=unverarbeitet, 2=verarbeitete Zutaten, 3=verarbeitet, 4=hochverarbeitet.
Flag-Typen: danger=UPF-Marker, warn=grenzwertig, ok=positiv. Max 4 Flags.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    clearInterval(t);fill.style.width='100%';
    if(data.error) throw new Error(data.error.message);
    let raw=data.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    const r=JSON.parse(raw);
    showResult(r,name);
    setTimeout(()=>{fill.style.width='0%'},800);
  }catch(e){
    clearInterval(t);fill.style.width='0%';
    document.getElementById('result-area').innerHTML=`<div class="msg msg-error">Fehler: ${e.message}</div>`;
  }
  btn.disabled=false;btn.textContent='Analysieren';
}

function showResult(r,name){
  const gc=r.gruppe;
  const labels=['','Gruppe 1 — Unverarbeitet','Gruppe 2 — Verarbeitete Zutat','Gruppe 3 — Verarbeitet','Gruppe 4 — Hochverarbeitet'];
  const flags=(r.flags||[]).map(f=>`<div class="flag f${f.typ[0]}">${f.text}</div>`).join('');
  document.getElementById('result-area').innerHTML=`
    <div class="result g${gc}">
      <span class="r-badge rb${gc}">${labels[gc]}</span>
      <div class="r-name">${name}</div>
      <div class="r-text">${r.bewertung}</div>
      <div class="flags">${flags}</div>
      ${r.empfehlung?`<div class="r-tip">Tipp: ${r.empfehlung}</div>`:''}
    </div>`;
}

function showMsg(id,text,type){
  document.getElementById(id).innerHTML=`<div class="msg msg-${type}">${text}</div>`;
}
</script>
</body>
</html>
